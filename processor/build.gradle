plugins {
    id 'java'
    id 'groovy'
    id 'maven-publish'
    id 'info.solidsoft.pitest'
    id 'io.freefair.lombok'
}

// Engine branch-coverage gate (change: harden-engine-as-library, task 4.3). The jacoco gate measures the UNIT
// suite (jacocoTestCoverageVerification reads test.exec; only the report merges integrationTest.exec). Raised to
// the design's 0.95 bar now that the engine seam tests land the unit-suite branch coverage above it (the pure
// debug/rendering and generated-Dagger classes are excluded from the measured set below).
ext.branchCoverageMinimum = 0.95

dependencies {
    annotationProcessor platform(project(':dependencies'))
    annotationProcessor 'org.projectlombok:lombok'
    annotationProcessor 'com.google.auto.service:auto-service'
    annotationProcessor 'com.google.dagger:dagger-compiler'

    compileOnly project(':annotations')

    compileOnly 'com.google.auto.service:auto-service-annotations'
    compileOnly 'org.jetbrains:annotations'
    compileOnly 'org.jspecify:jspecify'
    compileOnly 'org.projectlombok:lombok'

    implementation platform(project(':dependencies'))
    implementation project(':annotations')
    implementation project(':spi')
    implementation 'org.jgrapht:jgrapht-core'
    implementation 'org.jgrapht:jgrapht-io'
    implementation 'com.google.auto:auto-common'
    implementation 'com.google.dagger:dagger'

    // No edge to any strategy module, and none to the compile harness: the engine is unit-tested at its own seams
    // (change: harden-engine-as-library) with no strategy, no FakeStrategy, and no @Mapper compile. Real engine↔
    // strategy integration lives in the feature-e2e layer. Bundling of the builtins for consumers is owned by the
    // ':percolate' convenience starter. The unit specs mock the ResolveCtx seam and drive pure cores on plain
    // data — no javac substrate (change dissolve-private-type-universe deleted the last one, PrivateTypeUniverse).

    testImplementation platform(project(':dependencies'))
    testImplementation 'org.spockframework:spock-core'
    testImplementation 'org.assertj:assertj-core'
    testImplementation testFixtures(project(':spi'))

    // Doc-e2e only (change features-as-documentation, design D4): the compile-time-switches reference is a
    // processor-owned feature, so its @Tag('integration') doc-e2e lives here rather than in strategies-builtin —
    // but demonstrating an option's generated effect needs the real builtins on the annotation-processing
    // classpath. This is a test->main edge (unaffected main-scope module-boundaries guards, D4), and it is the
    // ONE place in this module that may reference a strategy; the unit suite stays strategy-free.
    testImplementation project(':strategies-builtin')
    testImplementation project(':test-foundation')
    testImplementation 'com.google.testing.compile:compile-testing'

    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testRuntimeOnly 'org.mockito:mockito-junit-jupiter'
}

// Task 3.2 (harden-engine-as-library): narrow, individually-justified jacoco exclusions for the classes where 95%
// branch coverage is not honestly reachable — pure debug/rendering and generated wiring with no engine decision
// logic. Applied to BOTH the report and the verification gate so the 0.95 bar measures engine logic only. Each:
def jacocoExcludes = [
        // Pure debug: the dump stages serialise the full graph / transforms / extracted plan to the Filer for
        // troubleshooting a mapper — no branching engine logic worth gating.
        'io/github/joke/percolate/processor/internal/stages/dump/**',
        // Pure Graphviz-DOT string rendering of the graph (debug visualisation); partially covered by DotRendererSpec,
        // but the remaining format branches are debug-only.
        'io/github/joke/percolate/processor/internal/graph/DotRenderer*',
        // Generated Dagger wiring, not engine logic (mirrors the pitest excludedClasses filter added in task 4.3).
        'io/github/joke/percolate/processor/Dagger*',
        // Change dissolve-private-type-universe (design D2/D3): the thin javax.lang.model read leaves and the
        // TypeName.get(mirror) render/Filer-write leaf. Each fuses no decision logic — the pure cores
        // (MappingDirectiveBuilder, AbstractMethodFilter, CallableMethodFilter/IndexCallableMethods,
        // MapperTypeDecisions) were split out and unit-tested — so what remains is genuinely compiler-backed and
        // is covered by the compile-based feature-e2e layer (real CompileResolveCtx), not honestly reachable by a
        // unit test without a javac substrate. Mirrors the pure-rendering exclusions above; thresholds unchanged.
        'io/github/joke/percolate/processor/internal/stages/discover/AnnotationDirectiveReader*',
        'io/github/joke/percolate/processor/internal/stages/discover/AbstractMethodReader*',
        'io/github/joke/percolate/processor/internal/stages/discover/CallableMethodIndexer*',
        'io/github/joke/percolate/processor/internal/stages/generate/AssembleMapperType*',
]
tasks.withType(JacocoReport).configureEach {
    classDirectories.setFrom(classDirectories.files.collect { fileTree(dir: it, exclude: jacocoExcludes) })
}
tasks.withType(JacocoCoverageVerification).configureEach {
    classDirectories.setFrom(classDirectories.files.collect { fileTree(dir: it, exclude: jacocoExcludes) })
}

// Module-specific pitest exclusions (change: type-query-seam, task 5.3) — moved out of the shared root block so
// root carries no module-specific class names (a `spi` pitest rollout would otherwise inherit processor's
// exclusions). Mirrors the jacoco exclusions above: generated Dagger wiring and pure debug/rendering, no engine
// decision logic to mutate.
pluginManager.withPlugin('info.solidsoft.pitest') {
    pitest {
        excludedClasses = [
                'io.github.joke.percolate.processor.Dagger*',
                'io.github.joke.percolate.processor.internal.stages.dump.*',
                'io.github.joke.percolate.processor.internal.graph.DotRenderer',
                // Change dissolve-private-type-universe (design D2/D3): the thin javax read leaves and the
                // TypeName.get(mirror) render leaf — decision logic split into unit-tested pure cores, the
                // compiler-backed residue covered by the compile-based feature-e2e layer (mirrors the jacoco
                // exclusions above; thresholds unchanged, never lowered).
                'io.github.joke.percolate.processor.internal.stages.discover.AnnotationDirectiveReader',
                'io.github.joke.percolate.processor.internal.stages.discover.AbstractMethodReader',
                'io.github.joke.percolate.processor.internal.stages.discover.CallableMethodIndexer',
                'io.github.joke.percolate.processor.internal.stages.generate.AssembleMapperType',
        ]
    }
}
