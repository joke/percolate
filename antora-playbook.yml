site:
  title: Percolate
  url: https://joke.github.io/percolate
  start_page: percolate::index.adoc

content:
  sources:
  - url: .
    branches: HEAD
      # Release tags become additional versions automatically once they exist (inert with zero tags).
    tags: [v*.*.*]
    start_path: docs

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

antora:
  extensions:
  # Installed into Antora's Node context by the org.antora plugin's `packages` map (see build.gradle).
  # Imports module-owned example fixtures into the content catalog via `ext.collector` scan entries.
  - require: '@antora/collector-extension'

output:
  dir: ./build/site
