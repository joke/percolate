site:
  title: Percolate
  url: https://joke.github.io/percolate
  start_page: percolate::index.adoc

content:
  sources:
  - url: .
    branches: HEAD
      # Release tags become additional versions automatically once they exist (inert with zero tags).
    tags: [v*.*.*]
    start_path: docs

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  # Overlays docs/supplemental-ui/ onto the extracted bundle. The only file it replaces is
  # partials/header-content.hbs, which strips the bundle's hardcoded demo navbar (Home/Products/Services/
  # Download, all dead links) and the mobile burger that toggled it open — everything else on the bundle
  # (styles, scripts, the version-dropdown partials) stays on the stock, upstream-maintained path.
  supplemental_files: docs/supplemental-ui

antora:
  extensions:
  # Installed into Antora's Node context by the org.antora plugin's `packages` map (see build.gradle).
  # Imports module-owned example fixtures into the content catalog via `ext.collector` scan entries.
  - require: '@antora/collector-extension'

output:
  dir: ./build/site
