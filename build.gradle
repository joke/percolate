plugins {
    id 'com.diffplug.gradle.spotless' apply false
    id 'com.palantir.baseline-config' apply false
    id 'net.ltgt.errorprone' apply false
    id 'net.ltgt.nullaway' apply false
    id 'org.danilopianini.cpd' apply false
}

subprojects { project ->
    group = 'io.github.joke.percolate'
    version = '0.1.0-SNAPSHOT'

    repositories {
        mavenCentral()
    }

    pluginManager.withPlugin('java-base') {
        pluginManager.apply 'com.diffplug.spotless'
        pluginManager.apply 'com.palantir.baseline-encoding'
        pluginManager.apply 'com.palantir.baseline-java-compiler-diagnostics'
        pluginManager.apply 'com.palantir.baseline-java-properties'
        pluginManager.apply 'com.palantir.baseline-module-jvm-args'
        pluginManager.apply 'jacoco'
        pluginManager.apply 'net.ltgt.errorprone'
        pluginManager.apply 'pmd'
//        pluginManager.apply 'org.danilopianini.cpd'
        // pluginManager.apply 'com.palantir.baseline-format'
        tasks.withType(JavaCompile).configureEach {
            options.release = 11
            options.compilerArgs << '-Werror'
            options.fork = true
            options.forkOptions.jvmArgs += [
                    '--sun-misc-unsafe-memory-access=allow'
            ]
        }
    }

    pluginManager.withPlugin('com.diffplug.spotless') {
        spotless {
            java {
                forbidWildcardImports()
                removeUnusedImports()
                palantirJavaFormat('2.87.0')
            }
        }
    }

    pluginManager.withPlugin('java') {
        pluginManager.apply 'com.palantir.baseline-test-heap'
        pluginManager.apply 'com.palantir.baseline-testing'

        tasks.named('test') {
            useJUnitPlatform {
                includeTags 'unit'
            }
        }

        tasks.register('integrationTest', Test) {
            useJUnitPlatform {
                includeTags 'integration'
            }
            testClassesDirs = sourceSets.test.output.classesDirs
            classpath = sourceSets.test.runtimeClasspath
        }

        tasks.named('check') {
            dependsOn 'integrationTest'
        }
        tasks.withType(Test).configureEach {
            maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1
        }    }

    pluginManager.withPlugin('groovy') {
        pluginManager.apply 'codenarc'
        codenarc {
            configFile = file("$rootDir/.codenarc.groovy")
            maxPriority1Violations = 0
            maxPriority2Violations = 0
            maxPriority3Violations = 0
        }
        dependencies {
            codenarc platform(project.project(':dependencies'))
            codenarc 'org.codenarc:CodeNarc'
        }
        tasks.withType(CodeNarc).configureEach {
            reports {
                xml.required = false
                html.required = true
                text.required = true
            }
        }
    }


    pluginManager.withPlugin('jacoco') {
        tasks.withType(JacocoReport).configureEach {
            dependsOn test
            dependsOn tasks.matching { it.name == 'integrationTest' }
            executionData.from fileTree(buildDir).include('jacoco/*.exec')
            reports {
                xml.required = true
            }
        }
        tasks.withType(JacocoCoverageVerification).configureEach {
            violationRules {
                rule {
                    limit {
                        counter = 'BRANCH'
                        value = 'COVEREDRATIO'
                        minimum = 0.6
                    }
                }
            }
        }
        tasks.withType(Test).configureEach {
            finalizedBy jacocoTestReport
        }
        tasks.named('check') {
            dependsOn jacocoTestCoverageVerification
        }
    }

    pluginManager.withPlugin('pmd') {
        pmd {
            consoleOutput = false
            toolVersion = '7.24.0' // keep in sync with below
            rulesMinimumPriority = 5
            ruleSets = ["$rootDir/.pmd.xml"]
        }
    }

//    pluginManager.withPlugin('org.danilopianini.cpd') {
//        cpd {
//            toolVersion = '7.24.0' // keep in sync with above
//        }
//        tasks.named('cpdCheck') {
//            reports {
//                text.required = true
//                xml.required = true
//            }
//        }
//    }

    pluginManager.withPlugin('net.ltgt.errorprone') {
        pluginManager.apply 'net.ltgt.nullaway'
        dependencies {
            errorprone('com.google.errorprone:error_prone_core:2.49.0')
        }
        tasks.withType(JavaCompile).configureEach {
            options.errorprone {
                disableWarningsInGeneratedCode = true
            }
        }
    }

    pluginManager.withPlugin('net.ltgt.nullaway') {
        dependencies {
            errorprone('com.uber.nullaway:nullaway:0.13.4')
        }
        tasks.withType(JavaCompile).configureEach {
            options.errorprone {
                error('RequireExplicitNullMarking')
                nullaway {
                    error()
                    onlyNullMarked = true
                    treatGeneratedAsUnannotated = true
                    jspecifyMode = true
                    suggestSuppressions = true
                    checkContracts = true
                    acknowledgeRestrictiveAnnotations = true
                }
            }
        }
    }

    // Consumer-facing Maven publication. Applied only by modules that opt into 'maven-publish'.
    // The starter publishes as 'percolate'; every other publishable module as 'percolate-<name>'.
    pluginManager.withPlugin('maven-publish') {
        def publishedArtifactId = project.name == 'percolate' ? 'percolate' : "percolate-${project.name}"
        pluginManager.withPlugin('java') {
            publishing {
                publications {
                    maven(MavenPublication) {
                        artifactId = publishedArtifactId
                        from components.java
                        // Pin concrete versions resolved from the build, so the POM needs no version platform.
                        versionMapping {
                            usage('java-api') { fromResolutionResult() }
                            usage('java-runtime') { fromResolutionResult() }
                        }
                        // Drop the internal ':dependencies' platform's BOM-import: with versions pinned above the
                        // import is redundant, and keeping it would leak internal constraints onto consumers (and
                        // force us to publish the internal platform). Leaves consumer POMs self-contained.
                        pom.withXml {
                            asNode().dependencyManagement.each { it.parent().remove(it) }
                        }
                    }
                }
            }
        }
        pluginManager.withPlugin('java-platform') {
            publishing {
                publications {
                    maven(MavenPublication) {
                        artifactId = publishedArtifactId
                        from components.javaPlatform
                    }
                }
            }
        }
    }
}

wrapper {
    gradleVersion = '9.5.0'
}
